spring:
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 14MB
  datasource:
    url: jdbc:mysql://gwon-db:3306/greeneye?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경사항을 DB에 자동 반영 (핵심!)
    properties:
      hibernate:
        format_sql: true
        show_sql: true

google:
  client:
    id: ${GOOGLE_CLIENT_ID}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    # 구 예: gemini-1.5-flash 는 API에서 제거·404 나는 경우가 많음 → 안정 버전으로 교체 가능
    model: ${GEMINI_MODEL:gemini-2.5-flash}

mqtt:
  # docker-compose 서비스 이름이 mosquitto 이면 동일 네트워크에서 호스트명도 mosquitto
  broker-url: ${MQTT_BROKER_URL:tcp://mosquitto:1883}
  client-id: ${MQTT_CLIENT_ID:greeneye-backend}
  subscriber-client-id: ${MQTT_SUBSCRIBER_CLIENT_ID:greeneye-backend-sub}

# 로컬에서만 true (IDE 환경변수 GREENEYE_DEV_USER_ENABLED=true). 배포 Docker에서는 false 유지.
greeneye:
  dev-user:
    enabled: ${GREENEYE_DEV_USER_ENABLED:false}
    oauth-id: ${GREENEYE_DEV_USER_OAUTH_ID:dev-local-greeneye}
  # 외부 IoT(ESP32) 공개 브로커 — /api/iot/config 에 그대로 노출. Cloudflare는 TCP 1883 프록시 불가 → DNS only A레코드 권장
  iot:
    mqtt-host: mqtt.greeneye.gwon.run
    mqtt-port: 1883