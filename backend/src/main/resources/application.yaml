spring:
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 14MB
  datasource:
    url: ${DB_URL:jdbc:mysql://gwon-db:3306/ecolens?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경사항을 DB에 자동 반영 (핵심!)
    properties:
      hibernate:
        format_sql: true
        show_sql: true

google:
  client:
    id: ${GOOGLE_CLIENT_ID}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    # 구 예: gemini-1.5-flash 는 API에서 제거·404 나는 경우가 많음 → 안정 버전으로 교체 가능
    model: ${GEMINI_MODEL:gemini-2.5-flash}

# 로컬에서만 true (IDE 환경변수 ECOLENS_DEV_USER_ENABLED=true). 배포 Docker에서는 false 유지.
ecolens:
  dev-user:
    enabled: ${ECOLENS_DEV_USER_ENABLED:false}
    oauth-id: ${ECOLENS_DEV_USER_OAUTH_ID:dev-local-ecolens}