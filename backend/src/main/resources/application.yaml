spring:
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 14MB
  datasource:
    url: jdbc:mysql://gwon-db:3306/ecolens?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경사항을 DB에 자동 반영 (핵심!)
    properties:
      hibernate:
        format_sql: true
        show_sql: true

google:
  client:
    id: ${GOOGLE_CLIENT_ID}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    # 구 예: gemini-1.5-flash 는 API에서 제거·404 나는 경우가 많음 → 안정 버전으로 교체 가능
    model: ${GEMINI_MODEL:gemini-2.5-flash}

mqtt:
  enabled: ${MQTT_ENABLED:false}
  # docker-compose 서비스 이름이 mosquitto 이면 동일 네트워크에서 호스트명도 mosquitto
  broker-url: ${MQTT_BROKER_URL:tcp://mosquitto:1883}
  client-id: ${MQTT_CLIENT_ID:ecolens-backend}
  subscriber-client-id: ${MQTT_SUBSCRIBER_CLIENT_ID:ecolens-backend-sub}

# 로컬에서만 true (IDE 환경변수 ECOLENS_DEV_USER_ENABLED=true). 배포 Docker에서는 false 유지.
ecolens:
  dev-user:
    enabled: ${ECOLENS_DEV_USER_ENABLED:false}
    oauth-id: ${ECOLENS_DEV_USER_OAUTH_ID:dev-local-ecolens}
  # 외부 IoT(ESP32) 공개 브로커 정보 (/api/iot/config 노출): Cloudflare Tunnel WebSocket 경로 기준
  iot:
    mqtt-host: mqtt-ecolens.gwon.run
    mqtt-port: 80